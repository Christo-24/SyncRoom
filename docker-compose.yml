services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: funchat-db
    env_file: .env
    environment:
      POSTGRES_DB: fun_chat_db
      POSTGRES_USER: fun_chat_user
      POSTGRES_PASSWORD: 1234
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fun_chat_user -d fun_chat_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - funchat-network

  # Redis (for caching and channel layer)
  redis:
    image: redis:7-alpine
    container_name: redis-chat
    env_file: .env
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - funchat-network

  # Django Backend with Channels
  backend:
    build:
      context: .
      dockerfile: backend/funchatbackend.dockerfile
    container_name: funchat-backend
    env_file: .env
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-django-insecure-your-secret-key-change-in-production}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-backend,localhost,127.0.0.1,funchat-backend}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://frontend:3000,http://127.0.0.1:3000}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:3000,http://frontend:3000,http://127.0.0.1:3000}
      DB_ENGINE: ${DB_ENGINE:-django.db.backends.postgresql}
      DB_NAME: ${DB_NAME:-fun_chat_db}
      DB_USER: ${DB_USER:-fun_chat_user}
      DB_PASSWORD: ${DB_PASSWORD:-1234}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - funchat-network

  # React Frontend
  frontend:
    build:
      context: .
      dockerfile: frontend/funchatfrontend.dockerfile
    container_name: funchat-frontend
    env_file: .env
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - funchat-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    env_file: .env
    container_name: funchat-nginx
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - funchat-network

volumes:
  postgres_data:

networks:
  funchat-network:
    driver: bridge
